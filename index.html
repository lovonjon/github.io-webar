<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport"
        content='width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=yes'>
    <title>Unity WebGL Player | TestImageAR</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        html {
            height: -webkit-fill-available;
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            width: 100vw;
            overflow: hidden;
            background: linear-gradient(180deg, #0b0033 0%, #2b0066 100%);
            background-color: #0b0033;
            color: #ffffff;
        }
        .ctaDiv {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            background: #fffa;
            z-index: 99;
        }
        /* Modal popup used for camera permission prompt (small centered dialog) */
        .modalOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modalContent {
            background: #ffffff;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 78vw;
            width: 320px;
            color: #071028;
            /* dark text for visibility on white background */
        }
        /* ALLOW ACCESS button styling */
        #startARButton {
            background: linear-gradient(90deg, #7b2cff, #a13bff);
            color: #ffffff;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
            transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
        }
        #startARButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        }
        #startARButton:active {
            transform: translateY(0);
        }
        /* background logo (non-modal) */
        #bgLogo {
            position: fixed;
            left: 50%;
            top: 12vh;
            transform: translateX(-50%);
            z-index: 1;
            pointer-events: none;
            opacity: 0.95;
        }
        #bgLogo img {
            width: 140px;
            height: auto;
            transform-origin: center;
            opacity: 0;
            animation: bgFadeScale 900ms cubic-bezier(.2, .9, .2, 1) forwards, logoFloat 3s ease-in-out 900ms infinite;
        }
        @keyframes bgFadeScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 0.95;
                transform: scale(1);
            }
        }
        @keyframes logoFloat {
            0% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-10px) scale(1.03);
            }
            100% {
                transform: translateY(0) scale(1);
            }
        }
        .modalContent p {
            text-align: center;
            margin: 0;
        }
    </style>
</head>
<body>
    <!--IMAGETARGETS-->
		<imagetarget id='01' src='targets/01.jpg'></imagetarget>
		<imagetarget id='02' src='targets/02.png'></imagetarget>
		<imagetarget id='03' src='targets/03.jpg'></imagetarget>

    <video id="webcam-video" muted autoplay playsinline style="width:1px;position:absolute"></video>
    <!-- <video id="webcam-video" muted autoplay playsinline style="width:100%; height:100%; object-fit:cover; position:absolute"></video> -->
    <canvas id="video-canvas" style="width:100%; height:100%; object-fit:cover; position:absolute"></canvas>
    <div id="startARDiv" class="modalOverlay" style="display:none">
        <div class="modalContent">
            <select id="chooseCamSel" style="display: none;" onchange="SelectCam()"></select>
            <p>This augmented reality experience requires access to your device's camera</p>
            <button id="startARButton" onclick="StartAR()" style="display:none">ALLOW ACCESS</button>
        </div>
    </div>
    <!-- background logo (non-modal) -->
    <div id="bgLogo"><img src="TemplateData/logo.png" alt="logo"></div>
    <div id="screenshotDiv" style="display: none;" class="ctaDiv">
        <div
            style="position:relative; background-color:white; padding:10px; box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.3), 0 6px 20px 0 rgba(0, 0, 0, 0.25);">
            <img id="screenshotImg" src="" alt="screenshot" style="width:80vw; height:80vh">
            <button onclick="document.getElementById('screenshotDiv').style.display = 'none';"
                style="position:absolute; transform:translateY(-100%); right:0; top:0">Close</button>
        </div>
    </div>
    <div id="confirmUrlDiv" style="display: none;" class="ctaDiv">
        <div
            style="position:relative; background-color:white; padding:10px; box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.3), 0 6px 20px 0 rgba(0, 0, 0, 0.25); width: 80vw; display:flex; flex-direction: column; align-items: center;">
            <p id="confirmUrlText" style="text-align: center; width:80%; overflow: hidden; text-overflow: ellipsis;">Are
                you sure you want to visit url.com?</p>
            <div>
                <button
                    onclick="window.open(newUrlString, '_blank').focus(); document.getElementById('confirmUrlDiv').style.display = 'none'">VISIT
                    SITE</button>
                <button onclick="document.getElementById('confirmUrlDiv').style.display = 'none'">GO BACK</button>
            </div>
        </div>
    </div>
    <div id="errorDiv" class="ctaDiv" style="display: none; background:#aaa">
        <p id="errorText" style="text-align: center; width:60vw; color:white"></p>
    </div>
    <div id="unity-container" class="unity-mobile">
        <canvas id="unity-canvas" style="width: 100%; height: 100%; background: #0000; z-index: -99"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <canvas id="video-canvas"></canvas>
    </div>
    <script src="arcamera.js" type="text/javascript"></script>
    <script src="itracker.js" type="text/javascript"></script>
    <script src="Build/Release.loader.js"></script>
    <script>
        /*
         Theme presets (for testing):
         Use `applyTheme(name)` in the browser console or uncomment the `applyTheme(...)` call
         at the end of this block to apply one immediately during page load.
         Available names: "Ocean", "Sunset", "Emerald", "Midnight", "Minimal"
        */
        const THEMES = {
            Ocean: {
                background: 'linear-gradient(180deg,#0123ff 0%,#0047ff 100%)',
                backgroundColor: '#0123ff',
                button: 'linear-gradient(90deg,#0066ff,#33a1ff)',
                buttonText: '#ffffff',
                modalText: '#071028'
            },
            Sunset: {
                background: 'linear-gradient(180deg,#ff7a00 0%,#ff3d6b 100%)',
                backgroundColor: '#ff7a00',
                button: 'linear-gradient(90deg,#ff8a00,#ffc107)',
                buttonText: '#ffffff',
                modalText: '#071028'
            },
            Emerald: {
                background: 'linear-gradient(180deg,#00695c 0%,#00bfa5 100%)',
                backgroundColor: '#00695c',
                button: 'linear-gradient(90deg,#00c853,#00e676)',
                buttonText: '#ffffff',
                modalText: '#071028'
            },
            Midnight: {
                background: 'linear-gradient(180deg,#0b0033 0%,#2b0066 100%)',
                backgroundColor: '#0b0033',
                button: 'linear-gradient(90deg,#7b2cff,#a13bff)',
                buttonText: '#ffffff',
                modalText: '#071028'
            },
            Minimal: {
                background: '#f5f7fa',
                backgroundColor: '#f5f7fa',
                button: 'linear-gradient(90deg,#3b82f6,#60a5fa)',
                buttonText: '#071028',
                modalText: '#071028'
            }
        };
        /* Apply a named theme to the page (runtime switch) */
        function applyTheme(name) {
            const t = THEMES[name];
            if (!t) { console.warn('Theme not found:', name); return; }
            document.body.style.background = t.background || t.backgroundColor;
            document.body.style.backgroundColor = t.backgroundColor || '';
            const btn = document.getElementById('startARButton');
            if (btn) {
                btn.style.background = t.button;
                btn.style.color = t.buttonText || '#fff';
            }
            const modal = document.querySelector('.modalContent');
            if (modal) modal.style.color = t.modalText || '#071028';
        }
        // Example: to auto-apply a theme during load for testing, uncomment one of the lines below
        // applyTheme('Ocean');
        // applyTheme('Sunset');
        // applyTheme('Emerald');
        // applyTheme('Midnight'); // default theme (styles applied via CSS instead to avoid flash)
        // applyTheme('Minimal');
        var initialize = async () => {
            var unityCanvas = document.querySelector("#unity-canvas");
            var videoCanvas = document.querySelector("#video-canvas");
            window.arCamera = new ARCamera(unityCanvas, videoCanvas);
            window.iTracker = new ImageTracker(arCamera);
            try {
                await window.iTracker.initialize();
                console.log("ImageTracker initialized!");
            }
            catch {
                console.error("Failed to initialize ImageTracker. Are you missing opencv.js? " + error);
                ShowError("Failed to initialize the experience.");
                return;
            }
            await LoadWebcams();
            // show the centered modal permission popup and enable the button
            document.getElementById("startARDiv").style.display = "flex";
            document.getElementById("startARButton").style.display = "block";
        }
        initialize();
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        function StartAR() {
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
            document.getElementById("startARDiv").style.display = "none";
            createUnityInstance(document.querySelector("#unity-canvas"), {
                dataUrl: "Build/Release.data.unityweb",
                frameworkUrl: "Build/Release.framework.js.unityweb",
                    codeUrl: "Build/Release.wasm.unityweb",
                        streamingAssetsUrl: "StreamingAssets",
                companyName: "DefaultCompany",
        productName: "TestImageAR",
        productVersion: "0.1",
                    //webglContextAttributes: { "preserveDrawingBuffer": true },
                    // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
                    // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
                    },
        (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
        }
                ).then((unityInstance) => {
            window.unityInstance = unityInstance;
            RequestWebcam();
                loadingBar.style.display = "none";
                // Hide background logo once Unity has finished loading
                const bg = document.getElementById('bgLogo');
                if (bg) bg.style.display = 'none';
        });
        loadingBar.style.display = "block";
        }
        //Set Facing Mode here ('environment', 'user', '')
		window.unityFacingMode = "environment"
        window.WEBCAM_SETTINGS = {
            video: {
                facingMode: unityFacingMode,
            },
            audio: false
        };
        window.requestingForPermissions = false;
        async function RequestWebcam() {
            window.requestingForPermissions = true;
            try {
                window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
                console.log("Webcam access granted");
                requestingForPermissions = false;
            }
            catch (err) {
                //user denied camera permission - show error panel
                console.error("getUserMedia error - ", err);
                ShowError("Failed to start the experience. Camera permission was denied");
                window.requestingForPermissions = false;
            }
        }
        async function StartWebcam() {
            console.log("StartWebcam")
            while (window.requestingForPermissions) {
                // Wait until requestingForPermissions becomes true.
                console.log("Waiting for permissions...");
                await new Promise(resolve => setTimeout(resolve, 100)); // Adjust the delay time as needed.
            }
            console.log("Got Permissions");
            if (window.webcamStream) {
                const video = document.querySelector("#webcam-video");
                video.srcObject = webcamStream;
                try {
                    await arCamera.startWebcam(video);
                    console.log("Webcam started successfully");
                    window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamSuccess');
                }
                catch (err) {
                    console.error("Webcam failed to start - ", err);
                    window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
                }
            }
            else {
                console.error("Webcam failed to start - permission not yet granted");
                window.unityInstance.SendMessage('ARCamera', 'OnStartWebcamFail');
            }
        }
        async function LoadWebcams() {
            let camDevices = [];
            // let backCams = [];
            let devices = await navigator.mediaDevices.enumerateDevices();
            var ctr = 0;
            devices.forEach(mediaDevice => {
                if (mediaDevice.kind === 'videoinput') {
                    if (window.unityFacingMode == 'environment' && !mediaDevice.label.includes('facing front')) {
                        //back cam only
                        camDevices.push(mediaDevice);
                    }
                    else if (window.unityFacingMode == 'user' && mediaDevice.label.includes('facing front')) {
                        //front cam only
                        camDevices.push(mediaDevice);
                    }
                    else {
                        //back and front
                        camDevices.push(mediaDevice);
                    }
                    ctr++;
                }
            });
            var select = document.getElementById("chooseCamSel");
            select.style.display = "block";
            var count = 0;
            //reverse array because some Android phones can't distinguish front and back cams at first load
            //and when this happens, most of the time, front cam goes first and back cam goes last
            camDevices = camDevices.reverse();
            camDevices.forEach(mediaDevice => {
                const option = document.createElement('option');
                option.value = mediaDevice.deviceId;
                let label = `Camera ${count}`;
                if (mediaDevice.label) {
                    label = mediaDevice.label
                }
                const textNode = document.createTextNode(label);
                option.appendChild(textNode);
                select.appendChild(option);
                count++;
            });
            iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
            select.style.display = "none";
        }
        function SelectCam() {
            var select = document.getElementById("chooseCamSel");
            window.deviceId = select.value;
            window.WEBCAM_SETTINGS.video['deviceId'] = deviceId;
            //console.log(window.WEBCAM_SETTINGS);
            iTracker.WEBCAM_NAME = select.options[select.selectedIndex].innerHTML;
        }
        async function FlipCam() {
            arCamera.stopWebcam();
            window.WEBCAM_SETTINGS.video.deviceId = '';
            if (window.WEBCAM_SETTINGS.video.facingMode == 'user') {
                window.WEBCAM_SETTINGS.video.facingMode = 'environment';
                arCamera.setFlipped(false);
            }
            else {
                window.WEBCAM_SETTINGS.video.facingMode = 'user';
                arCamera.setFlipped(true);
            }
            window.webcamStream = await navigator.mediaDevices.getUserMedia(window.WEBCAM_SETTINGS);
            const video = document.querySelector("#webcam-video");
            video.srcObject = webcamStream;
            await arCamera.startWebcam(video);
        }
        function ShowError(error) {
            document.getElementById("errorDiv").style.display = "flex";
            document.getElementById("errorText").innerHTML = error;
        }
        function ShowScreenshot(dataUrl) {
            document.getElementById("screenshotDiv").style.display = "flex";
            document.getElementById("screenshotImg").src = dataUrl;
            document.getElementById("screenshotImg").style.width = "80vw";
            document.getElementById("screenshotImg").style.height = 80 / window.innerWidth * window.innerHeight + "vw";
        }
        function ShowConfirmUrl(url) {
            document.getElementById("confirmUrlDiv").style.display = "flex";
            window.newUrlString = url;
            document.getElementById("confirmUrlText").innerText = "Are you sure you want to visit " + url;
        }
        window.ITRACKER_GLOBALS = {
            //place global settings here
            INTERNAL_SMOOTHFACTOR_POS: .075,
        }
    </script>
</body>
</html>
